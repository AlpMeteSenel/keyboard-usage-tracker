<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<title>Keyboard Usage Tracker</title>
<style>
  :root {
    --bg: #0a0b10;
    --bg2: #12141d;
    --card: #181b28;
    --card-hover: #1e2235;
    --border: #262a3d;
    --text: #e4e7f1;
    --muted: #6b7094;
    --accent: #7c6aff;
    --accent-glow: rgba(124,106,255,.25);
    --accent2: #ff6b8a;
    --green: #2dd4a8;
    --orange: #ffb347;
    --cyan: #22d3ee;
    --radius: 14px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #181b28 0%, #1a1440 50%, #181b28 100%);
    border-bottom: 1px solid var(--border);
    padding: 1.3rem 2rem;
    display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
  }
  .header h1 { font-size: 1.4rem; font-weight: 700; display: flex; align-items: center; gap: .5rem; }
  .header h1 .icon { width: 28px; height: 28px; vertical-align: middle; }
  .live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{ box-shadow: 0 0 0 0 rgba(45,212,168,.6); } 50%{ box-shadow: 0 0 0 6px rgba(45,212,168,0); } }
  .header-right { margin-left: auto; display: flex; gap: .6rem; align-items: center; }
  .btn {
    padding: .45rem 1rem; border-radius: 8px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: .8rem; cursor: pointer;
    transition: all .2s; font-family: var(--font);
  }
  .btn:hover { background: var(--card-hover); border-color: var(--accent); }
  .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .btn-accent:hover { background: #6b59ee; }
  .btn-danger { border-color: var(--accent2); color: var(--accent2); }
  .btn-danger:hover { background: rgba(255,107,138,.1); }

  /* ── Layout ── */
  .container { max-width: 1440px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }

  /* ── Plugin grid ── */
  .plugin-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.2rem;
  }
  .plugin-slot { min-width: 0; }
  .plugin-slot[data-width="full"] { grid-column: 1 / -1; }
  .plugin-slot[data-width="half"] { grid-column: span 1; }
  @media (max-width: 900px) { .plugin-grid { grid-template-columns: 1fr; } .plugin-slot[data-width="half"] { grid-column: 1 / -1; } }

  /* ── Stats grid ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: .8rem;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 1.1rem 1.2rem; transition: border-color .25s, transform .15s;
    position: relative; overflow: hidden;
  }
  .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .stat-card .label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .35rem; }
  .stat-card .value { font-size: 1.8rem; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1.1; }
  .stat-card .sub { font-size: .72rem; color: var(--muted); margin-top: .25rem; }
  .v-accent  { color: var(--accent); }
  .v-accent2 { color: var(--accent2); }
  .v-green   { color: var(--green); }
  .v-orange  { color: var(--orange); }
  .v-cyan    { color: var(--cyan); }

  /* ── Section titles ── */
  .section-title { font-size: 1rem; font-weight: 600; margin-bottom: .8rem; display: flex; align-items: center; gap: .5rem; }
  .section-title .dot { width: 6px; height: 6px; border-radius: 50%; }

  /* ── Chart container ── */
  .chart-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 1.2rem;
  }

  /* ── Bar chart (horizontal) ── */
  .bar-row { display: flex; align-items: center; margin-bottom: .35rem; }
  .bar-label { width: 80px; text-align: right; padding-right: 10px; font-size: .78rem; color: var(--muted); font-family: var(--mono); flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 20px; background: rgba(124,106,255,.06); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #a78bfa); border-radius: 4px; transition: width .5s ease; min-width: 2px; }
  .bar-count { width: 65px; text-align: right; padding-left: 8px; font-size: .75rem; color: var(--muted); font-variant-numeric: tabular-nums; flex-shrink: 0; }

  /* ── SVG charts ── */
  .svg-chart { width: 100%; overflow: visible; }
  .chart-empty { color: var(--muted); text-align: center; padding: 2.5rem 1rem; font-style: italic; font-size: .85rem; }

  /* ── Vertical bar chart ── */
  .vbar-container { display: flex; align-items: flex-end; gap: 2px; height: 220px; padding-top: 10px; }
  .vbar-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
  .vbar { width: 100%; min-height: 2px; border-radius: 3px 3px 0 0; transition: height .4s ease; cursor: default; position: relative; }
  .vbar:hover { filter: brightness(1.3); }
  .vbar-label { font-size: .55rem; color: var(--muted); margin-top: 4px; font-family: var(--mono); }
  .vbar-tooltip { display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 3px 8px; border-radius: 5px; font-size: .7rem; white-space: nowrap; pointer-events: none; z-index: 10; }
  .vbar:hover .vbar-tooltip { display: block; }

  /* ── WPM Line chart (SVG) ── */
  .wpm-line { fill: none; stroke: var(--green); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .wpm-area { fill: url(#wpmGrad); }
  .wpm-dot { fill: var(--green); transition: r .15s; }
  .wpm-crosshair { stroke: var(--muted); stroke-width: 0.8; stroke-dasharray: 3,3; opacity: 0; transition: opacity .15s; }
  .wpm-hover-dot { fill: var(--green); stroke: #fff; stroke-width: 2; opacity: 0; transition: opacity .15s; }
  .wpm-hover-area { fill: transparent; cursor: crosshair; }
  .grid-line { stroke: var(--border); stroke-width: 0.5; }
  .axis-label { fill: var(--muted); font-size: 10px; font-family: var(--mono); }
  #wpm-tooltip { position: fixed; display: none; background: #000d; color: #fff; padding: 5px 10px; border-radius: 6px; font-size: .75rem; pointer-events: none; z-index: 100; white-space: nowrap; backdrop-filter: blur(4px); border: 1px solid var(--border); }
  #wpm-tooltip .tt-time { color: var(--muted); } #wpm-tooltip .tt-val { color: var(--green); font-weight: 700; }

  /* ── Keyboard heatmap ── */
  .keyboard-container { overflow-x: auto; overflow-y: visible; padding-bottom: .5rem; display: flex; justify-content: center; }
  .keyboard { display: flex; flex-direction: column; gap: 5px; min-width: 940px; padding: 12px; background: #10121a; border-radius: 12px; border: 1px solid rgba(255,255,255,.04); overflow: visible; }
  .kb-row { display: flex; gap: 4px; }
  .kb-row.kb-row-overlap { margin-top: -49px; }
  .kb-key {
    height: 44px; border-radius: 5px;
    border: 1px solid rgba(255,255,255,.08);
    border-bottom: 3px solid rgba(0,0,0,.4);
    display: flex; align-items: center; justify-content: center;
    font-size: .7rem; font-family: var(--mono); color: var(--text);
    transition: all .15s ease; cursor: default; position: relative; flex-shrink: 0;
    background: var(--card-hover);
    box-shadow: 0 2px 3px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.04);
    user-select: none;
  }
  .kb-key.kb-key-tall { align-self: flex-start; }
  .kb-key:hover { transform: translateY(-2px); z-index: 2; border-color: rgba(255,255,255,.25); box-shadow: 0 4px 12px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.06); }
  .kb-key .kb-label { text-shadow: 0 1px 2px rgba(0,0,0,.6); white-space: nowrap; font-size: .68rem; }
  .kb-key.kb-key-sub { flex-direction: column; align-items: stretch; justify-content: space-between; padding: 6px 7px 5px; }
  .kb-key.kb-key-sub .kb-label { font-size: .82rem; line-height: 1; align-self: center; }
  .kb-key .kb-sub-label { display: none; }
  .kb-key.kb-key-sub .kb-sub-label {
    display: block;
    font-size: .52rem;
    line-height: 1;
    color: var(--muted);
    text-align: left;
  }
  .kb-key .kb-count { display: none; }

  /* ── Keyboard tooltip ── */
  .kb-tooltip {
    display: none; position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
    background: #1a1d2e; color: var(--text); padding: 6px 10px; border-radius: 7px;
    font-size: .72rem; white-space: nowrap; pointer-events: none; z-index: 20;
    border: 1px solid var(--border); box-shadow: 0 6px 20px rgba(0,0,0,.5);
    font-family: var(--mono);
  }
  .kb-tooltip::after {
    content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 5px solid transparent; border-top-color: #1a1d2e;
  }
  .kb-key.tt-below .kb-tooltip {
    bottom: auto; top: calc(100% + 8px);
  }
  .kb-key.tt-below .kb-tooltip::after {
    top: auto; bottom: 100%; border-top-color: transparent; border-bottom-color: #1a1d2e;
  }
  .kb-tooltip .tt-key { font-weight: 600; color: var(--accent); }
  .kb-tooltip .tt-count { color: var(--accent2); font-weight: 700; }
  .kb-key:hover .kb-tooltip { display: block; }

  /* ── Hold duration table ── */
  .hold-table { width: 100%; border-collapse: collapse; font-size: .8rem; }
  .hold-table th { text-align: left; color: var(--muted); font-weight: 500; padding: .4rem .6rem; border-bottom: 1px solid var(--border); font-size: .7rem; text-transform: uppercase; letter-spacing: .04em; }
  .hold-table td { padding: .35rem .6rem; font-variant-numeric: tabular-nums; }
  .hold-table tr:nth-child(even) td { background: rgba(255,255,255,.015); }
  .hold-table .key-col { font-family: var(--mono); color: var(--green); }
  .hold-table .ms-col { color: var(--accent); }

  /* ── Recent feed ── */
  .recent-feed { display: flex; flex-wrap: wrap; gap: .3rem; max-height: 250px; overflow-y: auto; }
  .recent-key {
    background: rgba(124,106,255,.08); border: 1px solid var(--border);
    padding: .18rem .5rem; border-radius: 5px; font-size: .72rem;
    font-family: var(--mono); color: var(--text); cursor: default;
    transition: border-color .2s;
  }
  .recent-key:hover { border-color: var(--accent); }
  .recent-key .ts { color: var(--muted); font-size: .58rem; margin-left: .25rem; }

  /* ── Period breakdown ── */
  .period-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: .6rem;
  }
  @media (max-width: 900px) { .period-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 600px) { .period-grid { grid-template-columns: repeat(2, 1fr); } }
  .period-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 1rem 1.1rem; transition: border-color .25s, transform .15s;
  }
  .period-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .period-card .period-name { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .6rem; font-weight: 600; }
  .period-card .period-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: .3rem; }
  .period-card .period-label { font-size: .7rem; color: var(--muted); }
  .period-card .period-value { font-size: .85rem; font-weight: 600; font-variant-numeric: tabular-nums; }
  .period-card .pv-keys { color: var(--accent); }
  .period-card .pv-clicks { color: var(--accent2); }
  .period-card .pv-wpm { color: var(--green); }
  .period-card .pv-active { color: var(--cyan); }

  /* ── Period nav buttons ── */
  .period-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: .6rem; }
  .period-nav .period-name { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; font-weight: 600; margin: 0; }
  .period-nav-btn {
    background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 4px;
    width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: .7rem; transition: all .2s; padding: 0; line-height: 1;
  }
  .period-nav-btn:hover:not(:disabled) { color: var(--fg); border-color: var(--accent); background: rgba(124,106,255,.1); }
  .period-nav-btn:disabled { opacity: .25; cursor: default; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ── Heatmap legend ── */
  .legend { display: flex; align-items: center; gap: .5rem; margin-top: .7rem; font-size: .7rem; color: var(--muted); }
  .legend-bar { width: 120px; height: 10px; border-radius: 3px; background: linear-gradient(90deg, #1e2235, #3b2f8a, #7c6aff, #ff6b8a, #ff4444); }

  /* ── Profile selector ── */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .8rem; }
  .section-header .section-title { margin-bottom: 0; }
  .profile-select { padding: .3rem .6rem; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: .72rem; font-family: var(--font); cursor: pointer; outline: none; }
  .profile-select:hover { border-color: var(--accent); }
  .profile-select option { background: var(--card); color: var(--text); }

  /* ── View toggle button ── */
  .view-toggle { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: .25rem .55rem; font-size: .82rem; cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: .3rem; font-family: var(--font); }
  .view-toggle:hover { border-color: var(--accent); color: var(--text); }
  .view-toggle.active { border-color: var(--accent); color: var(--accent); background: rgba(124,106,255,.1); }
  .toggle-group { display: flex; gap: .3rem; }

  /* ── Hold histogram ── */
  .hold-histogram .hbar-row { display: flex; align-items: center; margin-bottom: .3rem; }
  .hold-histogram .hbar-label { width: 75px; text-align: right; padding-right: 8px; font-size: .72rem; color: var(--green); font-family: var(--mono); flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hold-histogram .hbar-track { flex: 1; height: 22px; background: rgba(255,179,71,.06); border-radius: 4px; overflow: hidden; position: relative; }
  .hold-histogram .hbar-fill { height: 100%; border-radius: 4px; transition: width .5s ease; min-width: 2px; }
  .hold-histogram .hbar-fill-avg { background: linear-gradient(90deg, var(--orange), #ffcf87); }
  .hold-histogram .hbar-fill-max { background: linear-gradient(90deg, var(--accent2), #ff9bb5); opacity: .45; position: absolute; top: 0; left: 0; height: 100%; border-radius: 4px; z-index: 0; }
  .hold-histogram .hbar-fill-avg { position: relative; z-index: 1; }
  .hold-histogram .hbar-value { width: 80px; text-align: right; padding-left: 8px; font-size: .68rem; color: var(--muted); font-variant-numeric: tabular-nums; flex-shrink: 0; font-family: var(--mono); }
  .hold-legend { display: flex; gap: 1rem; margin-top: .5rem; font-size: .68rem; color: var(--muted); align-items: center; }
  .hold-legend-swatch { width: 14px; height: 10px; border-radius: 2px; display: inline-block; margin-right: .3rem; }

  .refresh-note { text-align: center; color: var(--muted); font-size: .68rem; margin-top: 1rem; opacity: .6; }

  /* ── Settings drawer ── */
  .settings-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 900;
    backdrop-filter: blur(2px);
  }
  .settings-overlay.open { display: block; }
  .settings-drawer {
    position: fixed; top: 0; right: -420px; width: 400px; max-width: 90vw; height: 100vh;
    background: var(--bg2); border-left: 1px solid var(--border);
    z-index: 901; transition: right .3s ease; overflow-y: auto;
    padding: 1.5rem;
  }
  .settings-drawer.open { right: 0; }
  .settings-drawer h2 { font-size: 1.1rem; margin-bottom: .3rem; }
  .settings-drawer .settings-sub { font-size: .72rem; color: var(--muted); margin-bottom: 1.2rem; }
  .settings-drawer .settings-section { margin-bottom: 1.2rem; }
  .settings-drawer .settings-section-title { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .5rem; }
  .settings-close {
    position: absolute; top: 1rem; right: 1rem; background: none; border: none;
    color: var(--muted); font-size: 1.2rem; cursor: pointer; padding: .3rem;
    transition: color .2s;
  }
  .settings-close:hover { color: var(--text); }

  /* ── Plugin list in settings ── */
  .plugin-item {
    display: flex; align-items: center; gap: .6rem; padding: .55rem .7rem;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: .4rem; transition: border-color .2s;
  }
  .plugin-item:hover { border-color: var(--accent); }
  .plugin-item.dragging { opacity: .5; border-color: var(--accent); }
  .plugin-item .drag-handle {
    cursor: grab; color: var(--muted); font-size: .9rem; user-select: none;
    display: flex; align-items: center;
  }
  .plugin-item .drag-handle:active { cursor: grabbing; }
  .plugin-item .pi-name { flex: 1; font-size: .82rem; font-weight: 500; }
  .plugin-item .pi-controls { display: flex; align-items: center; gap: .4rem; }
  .pi-width-btn {
    background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 4px;
    padding: .15rem .4rem; font-size: .65rem; cursor: pointer; transition: all .2s;
    font-family: var(--font);
  }
  .pi-width-btn:hover { border-color: var(--accent); color: var(--text); }
  .pi-width-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(124,106,255,.1); }

  /* ── Toggle switch ── */
  .toggle-switch {
    position: relative; width: 36px; height: 20px; flex-shrink: 0;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-switch .slider {
    position: absolute; inset: 0; background: var(--border); border-radius: 20px;
    cursor: pointer; transition: background .2s;
  }
  .toggle-switch .slider::before {
    content: ''; position: absolute; width: 16px; height: 16px; left: 2px; top: 2px;
    background: var(--text); border-radius: 50%; transition: transform .2s;
  }
  .toggle-switch input:checked + .slider { background: var(--accent); }
  .toggle-switch input:checked + .slider::before { transform: translateX(16px); }

  /* ── Reset button ── */
  .btn-reset {
    padding: .4rem .8rem; border-radius: 6px; border: 1px solid var(--border);
    background: none; color: var(--muted); font-size: .75rem; cursor: pointer;
    transition: all .2s; font-family: var(--font); margin-top: .5rem;
  }
  .btn-reset:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(255,107,138,.08); }

  .drop-indicator {
    height: 3px; background: var(--accent); border-radius: 2px; margin: 2px 0;
    transition: opacity .15s; opacity: 0;
  }
  .drop-indicator.visible { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1><img class="icon" src="/favicon.ico" alt=""> Keyboard Usage Tracker</h1>
  <div class="live-dot" title="Live — auto-refreshing"></div>
  <div class="header-right">
    <button class="btn" onclick="location.reload()">↻ Refresh</button>
    <button class="btn" id="settings-btn" onclick="toggleSettings()" title="Customize layout">⚙ Customize</button>
    <button class="btn btn-danger" id="restart-btn" onclick="doRestart()">⟳ Restart Tracker</button>
    <button class="btn btn-danger" id="stop-btn" onclick="doStop()">■ Stop Tracker</button>
  </div>
</div>

<!-- Settings drawer -->
<div class="settings-overlay" id="settings-overlay" onclick="toggleSettings()"></div>
<div class="settings-drawer" id="settings-drawer">
  <button class="settings-close" onclick="toggleSettings()">✕</button>
  <h2>Customize Dashboard</h2>
  <div class="settings-sub">Drag to reorder, toggle to show/hide, and resize plugins.</div>
  <div class="settings-section">
    <div class="settings-section-title">Plugins</div>
    <div id="plugin-list"></div>
  </div>
  <button class="btn-reset" onclick="resetPluginConfig()">Reset to defaults</button>
</div>

<div class="container">
  <div class="plugin-grid" id="plugin-grid"></div>
  <div class="refresh-note">Auto-refreshes every 2 seconds</div>
</div>

<!-- Global tooltip for WPM chart -->
<div id="wpm-tooltip"></div>

<script>
// ═══════════════════════════════════════════════
//  Shared utilities
// ═══════════════════════════════════════════════
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtNum(n) { return Number(n).toLocaleString(); }
function animateValue(el, target, duration) {
  if (!el) return;
  const start = parseInt(el.textContent.replace(/[^0-9.-]/g,'')) || 0;
  if (start === target) return;
  const range = target - start;
  const startTime = performance.now();
  function step(ts) {
    const progress = Math.min((ts - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.round(start + range * eased).toLocaleString();
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

//  Token management
// ═══════════════════════════════════════════════
let _statsToken = '';
let _restartToken = '';
let _stopToken = '';
async function refreshTokens() {
  try {
    const res = await fetch('/api/tokens');
    const t = await res.json();
    _statsToken = t.stats || '';
    _restartToken = t.restart || '';
    _stopToken = t.stop || '';
  } catch(e) { console.error('Token refresh failed:', e); }
}
refreshTokens();
setInterval(refreshTokens, 5 * 60 * 1000);

async function postControlAction(path, token) {
  await refreshTokens();
  const res = await fetch(path + '?token=' + encodeURIComponent(token), { method: 'POST' });
  if (!res.ok) throw new Error('Control request failed');
}

async function doRestart() {
  const btn = document.getElementById('restart-btn');
  btn.textContent = '⟳ Restarting…'; btn.disabled = true;
  try {
    await postControlAction('/api/restart', _restartToken);
    btn.textContent = '✓ Restarted';
    setTimeout(() => location.reload(), 2000);
  } catch(e) {
    btn.textContent = '✗ Failed';
    setTimeout(() => { btn.textContent = '⟳ Restart Tracker'; btn.disabled = false; }, 2000);
  }
}

async function doStop() {
  const btn = document.getElementById('stop-btn');
  btn.textContent = '■ Stopping…'; btn.disabled = true;
  try {
    await postControlAction('/api/stop', _stopToken);
    btn.textContent = '✓ Stopped';
  } catch(e) {
    btn.textContent = '✗ Failed';
    setTimeout(() => { btn.textContent = '■ Stop Tracker'; btn.disabled = false; }, 2000);
  }
}

//  Plugin Manager
// ═══════════════════════════════════════════════
const STORAGE_KEY = 'dashboard-plugins';

const pluginRegistry = {};

function registerPlugin(plugin) {
  pluginRegistry[plugin.id] = plugin;
}

function getDefaultConfig() {
  return [
    { id: 'stats-cards',       enabled: true, width: 'full' },
    { id: 'activity-breakdown', enabled: true, width: 'full' },
    { id: 'wpm-timeline',      enabled: true, width: 'full' },
    { id: 'activity-charts',   enabled: true, width: 'full' },
    { id: 'keyboard-heatmap',  enabled: true, width: 'full' },
    { id: 'top-keys',          enabled: true, width: 'half' },
    { id: 'hold-duration',     enabled: true, width: 'half' },
    { id: 'recent-activity',   enabled: true, width: 'full' },
  ];
}

function loadConfig() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return getDefaultConfig();
    const saved = JSON.parse(raw);
    // Merge: ensure all registered plugins exist, preserve saved order & settings
    const defaults = getDefaultConfig();
    const savedIds = new Set(saved.map(s => s.id));
    const merged = [];
    for (const s of saved) {
      if (pluginRegistry[s.id]) merged.push(s);
    }
    // Append any new plugins not in saved config
    for (const d of defaults) {
      if (!savedIds.has(d.id)) merged.push(d);
    }
    return merged;
  } catch { return getDefaultConfig(); }
}

function saveConfig(config) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
}

let currentConfig = [];

function renderPlugins() {
  const grid = document.getElementById('plugin-grid');
  grid.innerHTML = '';
  for (const cfg of currentConfig) {
    if (!cfg.enabled) continue;
    const plugin = pluginRegistry[cfg.id];
    if (!plugin) continue;
    const slot = document.createElement('div');
    slot.className = 'plugin-slot';
    slot.dataset.pluginId = cfg.id;
    slot.dataset.width = cfg.width;
    grid.appendChild(slot);
    plugin.render(slot);
    if (plugin.init) plugin.init(slot);
  }
}

function updateAllPlugins(data) {
  for (const cfg of currentConfig) {
    if (!cfg.enabled) continue;
    const plugin = pluginRegistry[cfg.id];
    if (plugin && plugin.update) plugin.update(data);
  }
}

// ═══════════════════════════════════════════════
//  Settings panel
// ═══════════════════════════════════════════════
function toggleSettings() {
  const overlay = document.getElementById('settings-overlay');
  const drawer = document.getElementById('settings-drawer');
  const isOpen = drawer.classList.contains('open');
  overlay.classList.toggle('open', !isOpen);
  drawer.classList.toggle('open', !isOpen);
  if (!isOpen) renderSettingsList();
}

function renderSettingsList() {
  const list = document.getElementById('plugin-list');
  list.innerHTML = '';
  for (let i = 0; i < currentConfig.length; i++) {
    const cfg = currentConfig[i];
    const plugin = pluginRegistry[cfg.id];
    if (!plugin) continue;

    const item = document.createElement('div');
    item.className = 'plugin-item';
    item.draggable = true;
    item.dataset.idx = i;

    item.innerHTML = `
      <span class="drag-handle" title="Drag to reorder">⠿</span>
      <span class="pi-name">${esc(plugin.name)}</span>
      <div class="pi-controls">
        <button class="pi-width-btn ${cfg.width === 'half' ? 'active' : ''}" data-w="half" title="Half width">½</button>
        <button class="pi-width-btn ${cfg.width === 'full' ? 'active' : ''}" data-w="full" title="Full width">1</button>
        <label class="toggle-switch"><input type="checkbox" ${cfg.enabled ? 'checked' : ''}><span class="slider"></span></label>
      </div>
    `;

    // Width buttons
    item.querySelectorAll('.pi-width-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        cfg.width = btn.dataset.w;
        saveConfig(currentConfig);
        renderPlugins();
        renderSettingsList();
      });
    });

    // Toggle
    item.querySelector('input[type=checkbox]').addEventListener('change', (e) => {
      cfg.enabled = e.target.checked;
      saveConfig(currentConfig);
      renderPlugins();
      // Force update with last data if enabling
      if (cfg.enabled && window._lastStatsData) updateAllPlugins(window._lastStatsData);
    });

    // Drag & drop
    item.addEventListener('dragstart', (e) => {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(i));
      item.classList.add('dragging');
    });
    item.addEventListener('dragend', () => { item.classList.remove('dragging'); });
    item.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      item.style.borderColor = 'var(--accent)';
    });
    item.addEventListener('dragleave', () => { item.style.borderColor = ''; });
    item.addEventListener('drop', (e) => {
      e.preventDefault();
      item.style.borderColor = '';
      const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
      const toIdx = parseInt(item.dataset.idx);
      if (fromIdx === toIdx) return;
      const [moved] = currentConfig.splice(fromIdx, 1);
      currentConfig.splice(toIdx, 0, moved);
      saveConfig(currentConfig);
      renderPlugins();
      renderSettingsList();
      if (window._lastStatsData) updateAllPlugins(window._lastStatsData);
    });

    list.appendChild(item);
  }
}

function resetPluginConfig() {
  localStorage.removeItem(STORAGE_KEY);
  currentConfig = getDefaultConfig();
  saveConfig(currentConfig);
  renderPlugins();
  renderSettingsList();
  if (window._lastStatsData) updateAllPlugins(window._lastStatsData);
}

registerPlugin({
  id: 'wpm-timeline',
  name: 'WPM Timeline',
  render(slot) {
    slot.innerHTML = `<div class="chart-card">
      <div class="section-title"><span class="dot" style="background:var(--green)"></span> WPM Timeline (Last Hour)</div>
      <div id="wpm-chart"><div class="chart-empty">Collecting WPM data…</div></div>
    </div>`;
  },
  update(d) {
    const el = document.getElementById('wpm-chart');
    if (!el) return;
    const data = d.wpm_timeline;
    if (!data || data.length === 0) { el.innerHTML = '<div class="chart-empty">No WPM data in the last hour. Start typing!</div>'; return; }

    const W = 700, H = 160, pad = {t:20,r:20,b:30,l:45};
    const cw = W-pad.l-pad.r, ch = H-pad.t-pad.b;
    const maxWpm = Math.max(...data.map(d=>d.wpm), 10);
    const xStep = cw / Math.max(data.length - 1, 1);

    let pts = data.map((d,i) => [pad.l + i*xStep, pad.t + ch - (d.wpm/maxWpm)*ch]);
    let pathD = pts.map((p,i) => (i===0?'M':'L')+p[0]+','+p[1]).join(' ');
    let areaD = pathD + ` L${pts[pts.length-1][0]},${pad.t+ch} L${pts[0][0]},${pad.t+ch} Z`;

    let grid = '';
    for (let i=0;i<=4;i++) {
      const y = pad.t + (ch/4)*i;
      const v = Math.round(maxWpm - (maxWpm/4)*i);
      grid += `<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" class="grid-line"/>`;
      grid += `<text x="${pad.l-8}" y="${y+4}" text-anchor="end" class="axis-label">${v}</text>`;
    }
    let xlabels = '';
    const step = Math.max(1, Math.floor(data.length / 8));
    for (let i=0;i<data.length;i+=step) {
      xlabels += `<text x="${pts[i][0]}" y="${H-4}" text-anchor="middle" class="axis-label">${esc(data[i].minute)}</text>`;
    }
    let dots = pts.map((p) => `<circle cx="${p[0]}" cy="${p[1]}" r="3" class="wpm-dot"/>`).join('');

    el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" class="svg-chart">
      <defs><linearGradient id="wpmGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(45,212,168,.3)"/><stop offset="100%" stop-color="rgba(45,212,168,0)"/></linearGradient></defs>
      ${grid}${xlabels}
      <path d="${areaD}" class="wpm-area"/>
      <path d="${pathD}" class="wpm-line"/>
      ${dots}
      <line class="wpm-crosshair" x1="0" y1="${pad.t}" x2="0" y2="${pad.t+ch}"/>
      <circle class="wpm-hover-dot" r="5"/>
      <rect class="wpm-hover-area" x="${pad.l}" y="${pad.t}" width="${cw}" height="${ch}"/>
    </svg>`;

    const svg = el.querySelector('svg');
    const crosshair = svg.querySelector('.wpm-crosshair');
    const hoverDot = svg.querySelector('.wpm-hover-dot');
    const tip = document.getElementById('wpm-tooltip');
    const hoverArea = svg.querySelector('.wpm-hover-area');

    hoverArea.addEventListener('mousemove', e => {
      const rect = svg.getBoundingClientRect();
      const scaleX = W / rect.width;
      const mouseX = (e.clientX - rect.left) * scaleX;
      let nearest = 0, minDist = Infinity;
      for (let i = 0; i < pts.length; i++) {
        const dd = Math.abs(pts[i][0] - mouseX);
        if (dd < minDist) { minDist = dd; nearest = i; }
      }
      const px = pts[nearest][0], py = pts[nearest][1];
      crosshair.setAttribute('x1', px); crosshair.setAttribute('x2', px); crosshair.style.opacity = '1';
      hoverDot.setAttribute('cx', px); hoverDot.setAttribute('cy', py); hoverDot.style.opacity = '1';
      tip.innerHTML = `<span class="tt-time">${esc(data[nearest].minute)}</span> &mdash; <span class="tt-val">${data[nearest].wpm.toFixed(1)} WPM</span>`;
      tip.style.display = 'block'; tip.style.left = e.clientX + 14 + 'px'; tip.style.top = e.clientY - 32 + 'px';
    });
    hoverArea.addEventListener('mouseleave', () => {
      crosshair.style.opacity = '0'; hoverDot.style.opacity = '0'; tip.style.display = 'none';
    });
  }
});

// ═══════════════════════════════════════════════
//  PLUGIN: Activity Charts
// ═══════════════════════════════════════════════
registerPlugin({
  id: 'activity-charts',
  name: 'Activity Charts',
  _view: 'hourly',
  render(slot) {
    slot.innerHTML = `<div class="chart-card">
      <div class="section-header">
        <div class="section-title"><span class="dot" id="activity-dot" style="background:var(--accent)"></span> <span id="activity-chart-title">Today's Keystrokes by Hour</span></div>
        <div class="toggle-group">
          <button class="view-toggle active" id="chart-hourly-btn" title="Today by Hour">&#128339;</button>
          <button class="view-toggle" id="chart-daily-btn" title="Last 30 Days">&#128197;</button>
          <button class="view-toggle" id="chart-weekly-btn" title="Last 12 Weeks">&#128200;</button>
          <button class="view-toggle" id="chart-monthly-btn" title="Last 12 Months">&#128198;</button>
        </div>
      </div>
      <div id="hourly-chart"><div class="chart-empty">No activity yet today. Start typing!</div></div>
      <div id="daily-chart" style="display:none"><div class="chart-empty">No daily data yet.</div></div>
      <div id="weekly-chart" style="display:none"><div class="chart-empty">No weekly data yet.</div></div>
      <div id="monthly-chart" style="display:none"><div class="chart-empty">No monthly data yet.</div></div>
    </div>`;
  },
  init() {
    const self = pluginRegistry['activity-charts'];
    const titles = { hourly:"Today's Keystrokes by Hour", daily:'Daily Keystrokes — Last 30 Days', weekly:'Weekly Keystrokes — Last 12 Weeks', monthly:'Monthly Keystrokes — Last 12 Months' };
    const colors = { hourly:'var(--accent)', daily:'var(--cyan)', weekly:'var(--orange)', monthly:'var(--accent2)' };
    function setView(view) {
      self._view = view;
      ['hourly','daily','weekly','monthly'].forEach(v => {
        const cel = document.getElementById(v + '-chart');
        if (cel) cel.style.display = v === view ? '' : 'none';
        const btn = document.getElementById('chart-' + v + '-btn');
        if (btn) btn.classList.toggle('active', v === view);
      });
      const title = document.getElementById('activity-chart-title');
      if (title) title.textContent = titles[view];
      const dot = document.getElementById('activity-dot');
      if (dot) dot.style.background = colors[view];
    }
    ['hourly','daily','weekly','monthly'].forEach(v => {
      const btn = document.getElementById('chart-' + v + '-btn');
      if (btn) btn.addEventListener('click', () => setView(v));
    });
  },
  update(d) {
    // Hourly
    const hEl = document.getElementById('hourly-chart');
    if (hEl) {
      const data = d.hourly_activity;
      if (!data || data.length === 0) { hEl.innerHTML = '<div class="chart-empty">No activity today yet. Start typing!</div>'; }
      else {
        const maxC = Math.max(...data.map(x=>x.count), 1);
        const hourMap = {}; for (const x of data) hourMap[x.hour] = x.count;
        let html = '<div class="vbar-container">';
        for (let h=0;h<24;h++) { const c=hourMap[h]||0; const pct=(c/maxC)*100; const color=c>0?'var(--accent)':'rgba(124,106,255,.1)'; html+=`<div class="vbar-wrapper"><div class="vbar" style="height:${Math.max(pct,2)}%;background:${color}"><span class="vbar-tooltip">${h}:00 — ${c.toLocaleString()}</span></div><div class="vbar-label">${h}</div></div>`; }
        html += '</div>'; hEl.innerHTML = html;
      }
    }
    // Daily
    const dEl = document.getElementById('daily-chart');
    if (dEl) {
      const dataMap = {}; if (d.daily_activity) for (const x of d.daily_activity) dataMap[x.date] = x.count;
      const days = []; const today = new Date();
      for (let i=29;i>=0;i--) { const dt=new Date(today); dt.setDate(dt.getDate()-i); const key=dt.toISOString().slice(0,10); days.push({date:key,count:dataMap[key]||0}); }
      const maxC=Math.max(...days.map(x=>x.count),1);
      let html='<div class="vbar-container">';
      for (const x of days) { const pct=(x.count/maxC)*100; const label=x.date.slice(5); const color=x.count>0?'var(--cyan)':'rgba(34,211,238,.1)'; html+=`<div class="vbar-wrapper"><div class="vbar" style="height:${Math.max(pct,2)}%;background:${color}"><span class="vbar-tooltip">${x.date} — ${x.count.toLocaleString()}</span></div><div class="vbar-label">${label}</div></div>`; }
      html+='</div>'; dEl.innerHTML=html;
    }
    // Weekly
    const wEl = document.getElementById('weekly-chart');
    if (wEl) {
      const dataMap={}; if (d.weekly_activity) for (const x of d.weekly_activity) dataMap[x.week]=x.count;
      const weeks=[]; const today=new Date();
      for (let i=11;i>=0;i--) { const dt=new Date(today); dt.setDate(dt.getDate()-i*7); const yr=dt.getFullYear(); const jan1=new Date(yr,0,1); const doy=Math.floor((dt-jan1)/86400000); const wn=Math.floor((doy+jan1.getDay())/7); const key=yr+'-W'+String(wn).padStart(2,'0'); if (!weeks.find(w=>w.week===key)) weeks.push({week:key,count:dataMap[key]||0}); }
      const maxC=Math.max(...weeks.map(x=>x.count),1);
      let html='<div class="vbar-container">';
      for (const x of weeks) { const pct=(x.count/maxC)*100; const label=x.week.replace(/^\d{4}-/,''); const color=x.count>0?'var(--orange)':'rgba(255,179,71,.1)'; html+=`<div class="vbar-wrapper"><div class="vbar" style="height:${Math.max(pct,2)}%;background:${color}"><span class="vbar-tooltip">${x.week} — ${x.count.toLocaleString()}</span></div><div class="vbar-label">${label}</div></div>`; }
      html+='</div>'; wEl.innerHTML=html;
    }
    // Monthly
    const mEl = document.getElementById('monthly-chart');
    if (mEl) {
      const dataMap={}; if (d.monthly_activity) for (const x of d.monthly_activity) dataMap[x.month]=x.count;
      const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const months=[]; const today=new Date();
      for (let i=11;i>=0;i--) { const dt=new Date(today.getFullYear(),today.getMonth()-i,1); const key=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0'); months.push({month:key,count:dataMap[key]||0}); }
      const maxC=Math.max(...months.map(x=>x.count),1);
      let html='<div class="vbar-container">';
      for (const x of months) { const pct=(x.count/maxC)*100; const mIdx=parseInt(x.month.slice(5))-1; const label=monthNames[mIdx]||x.month.slice(5); const color=x.count>0?'var(--accent2)':'rgba(255,107,138,.1)'; html+=`<div class="vbar-wrapper"><div class="vbar" style="height:${Math.max(pct,2)}%;background:${color}"><span class="vbar-tooltip">${x.month} — ${x.count.toLocaleString()}</span></div><div class="vbar-label">${label}</div></div>`; }
      html+='</div>'; mEl.innerHTML=html;
    }
  }
});

// ═══════════════════════════════════════════════
//  PLUGIN: Keyboard Heatmap
// ═══════════════════════════════════════════════
registerPlugin({
  id: 'keyboard-heatmap',
  name: 'Keyboard Heatmap',
  _currentProfile: localStorage.getItem('kb-profile') || 'turkish-q',
  _lastTopKeys: null,
  render(slot) {
    const self = pluginRegistry['keyboard-heatmap'];
    slot.innerHTML = `<div class="chart-card">
      <div class="section-header">
        <div class="section-title"><span class="dot" style="background:var(--accent2)"></span> Keyboard Heatmap</div>
        <select class="profile-select" id="kb-profile-select"></select>
      </div>
      <div class="keyboard-container"><div class="keyboard" id="keyboard-heatmap"></div></div>
      <div class="legend"><span>Less</span><div class="legend-bar"></div><span>More</span></div>
    </div>`;
    // Build profile selector
    const sel = document.getElementById('kb-profile-select');
    for (const [id, prof] of Object.entries(KEYBOARD_PROFILES)) {
      const opt = document.createElement('option');
      opt.value = id; opt.textContent = prof.name;
      if (id === self._currentProfile) opt.selected = true;
      sel.appendChild(opt);
    }
    self._buildKeyboard();
  },
  init() {
    const self = pluginRegistry['keyboard-heatmap'];
    const sel = document.getElementById('kb-profile-select');
    if (sel) sel.addEventListener('change', function() {
      self._currentProfile = this.value;
      localStorage.setItem('kb-profile', this.value);
      self._buildKeyboard();
      if (self._lastTopKeys) self._applyHeatmap(self._lastTopKeys);
    });
  },
  _buildKeyboard() {
    const self = pluginRegistry['keyboard-heatmap'];
    const profile = KEYBOARD_PROFILES[self._currentProfile] || KEYBOARD_PROFILES['turkish-q'];
    const el = document.getElementById('keyboard-heatmap');
    if (!el) return;
    el.innerHTML = '';

    function renderKey(key, parent, isTopRow) {
      const keyEl = document.createElement('div');
      keyEl.className = 'kb-key' + (isTopRow ? ' tt-below' : '') + (key.sub ? ' kb-key-sub' : '') + (key.h && key.h > 1 ? ' kb-key-tall' : '');
      keyEl.style.width = key.w + 'px';
      if (key.h && key.h > 1) keyEl.style.height = (44 * key.h + 5 * (key.h - 1)) + 'px';
      keyEl.dataset.key = key.id || key.d || key.k;
      keyEl.dataset.label = key.tooltip || key.k;
      const labelEl = document.createElement('span');
      labelEl.className = 'kb-label'; labelEl.textContent = key.k;
      keyEl.appendChild(labelEl);
      if (key.sub) {
        const subEl = document.createElement('span');
        subEl.className = 'kb-sub-label'; subEl.textContent = key.sub;
        keyEl.appendChild(subEl);
      }
      const countEl = document.createElement('span');
      countEl.className = 'kb-count'; countEl.textContent = '0';
      keyEl.appendChild(countEl);
      const tt = document.createElement('div');
      tt.className = 'kb-tooltip';
      tt.innerHTML = '<span class="tt-key">' + esc(keyEl.dataset.label) + '</span> &mdash; <span class="tt-count">0</span> presses';
      keyEl.appendChild(tt);
      parent.appendChild(keyEl);
    }

    for (let rowIdx = 0; rowIdx < profile.rows.length; rowIdx++) {
      const row = profile.rows[rowIdx];
      const rowEl = document.createElement('div');
      rowEl.className = 'kb-row';
      if (rowIdx > 0 && profile.rows[rowIdx - 1].some(key => !key.gap && key.h && key.h > 1)) rowEl.classList.add('kb-row-overlap');
      const firstBigGap = row.findIndex(k => k.gap && k.w >= 14);
      const mainKeys = firstBigGap >= 0 ? row.slice(0, firstBigGap) : row;
      const rightKeys = firstBigGap >= 0 ? row.slice(firstBigGap + 1) : [];
      for (const key of mainKeys) {
        if (key.gap) { const sp = document.createElement('div'); sp.style.width = key.w + 'px'; sp.style.flexShrink = '0'; rowEl.appendChild(sp); continue; }
        renderKey(key, rowEl, rowIdx === 0);
      }
      if (rightKeys.length > 0) { const sp = document.createElement('div'); sp.style.flex = '1'; sp.style.minWidth = '14px'; rowEl.appendChild(sp); }
      for (const key of rightKeys) {
        if (key.gap) { const sp = document.createElement('div'); sp.style.width = key.w + 'px'; sp.style.flexShrink = '0'; rowEl.appendChild(sp); continue; }
        renderKey(key, rowEl, rowIdx === 0);
      }
      el.appendChild(rowEl);
    }
  },
  _heatColor(ratio) {
    if (ratio <= 0) return '#1e2235';
    const h = 260 - ratio * 260, s = 55 + ratio * 35, l = 18 + ratio * 30;
    return `hsl(${h},${s}%,${l}%)`;
  },
  _applyHeatmap(topKeys) {
    const self = pluginRegistry['keyboard-heatmap'];
    if (!topKeys || topKeys.length === 0) return;
    const counts = {};
    for (const k of topKeys) counts[k.key_name] = (counts[k.key_name] || 0) + k.count;
    if (counts['LShift'] || counts['RShift']) counts['Shift'] = (counts['Shift'] || 0) + (counts['LShift'] || 0) + (counts['RShift'] || 0);
    if (counts['LCtrl'] || counts['RCtrl']) counts['Ctrl'] = (counts['Ctrl'] || 0) + (counts['LCtrl'] || 0) + (counts['RCtrl'] || 0);
    if (counts['LAlt'] || counts['RAlt']) counts['Alt'] = (counts['Alt'] || 0) + (counts['LAlt'] || 0) + (counts['RAlt'] || 0);
    const maxCount = Math.max(...Object.values(counts), 1);
    document.querySelectorAll('.kb-key').forEach(el => {
      const name = el.dataset.key;
      const c = counts[name] || 0;
      const ratio = maxCount > 0 ? c / maxCount : 0;
      el.style.background = self._heatColor(ratio);
      el.querySelector('.kb-count').textContent = c > 0 ? c.toLocaleString() : '';
      const tt = el.querySelector('.kb-tooltip');
      if (tt) {
        const label = el.dataset.label || el.querySelector('.kb-label').textContent;
        tt.innerHTML = '<span class="tt-key">' + esc(label) + '</span> &mdash; <span class="tt-count">' + (c > 0 ? c.toLocaleString() : '0') + '</span> presses';
      }
    });
  },
  update(d) {
    const self = pluginRegistry['keyboard-heatmap'];
    self._lastTopKeys = d.top_keys;
    self._applyHeatmap(d.top_keys);
  }
});

// ═══════════════════════════════════════════════
//  PLUGIN: Hold Duration
// ═══════════════════════════════════════════════
registerPlugin({
  id: 'hold-duration',
  name: 'Hold Duration',
  _view: 'table',
  render(slot) {
    slot.innerHTML = `<div class="chart-card">
      <div class="section-header">
        <div class="section-title"><span class="dot" style="background:var(--orange)"></span> Hold Duration Analysis</div>
        <div class="toggle-group">
          <button class="view-toggle active" id="hold-tbl-btn" title="Table view">&#9776;</button>
          <button class="view-toggle" id="hold-hist-btn" title="Histogram view">&#9635;</button>
        </div>
      </div>
      <div id="hold-table" style="max-height:400px;overflow-y:auto"><div class="chart-empty">No hold data yet.</div></div>
      <div id="hold-histogram" class="hold-histogram" style="max-height:400px;overflow-y:auto;display:none"><div class="chart-empty">No hold data yet.</div></div>
    </div>`;
  },
  init() {
    const self = pluginRegistry['hold-duration'];
    function setView(mode) {
      self._view = mode;
      const tbl = document.getElementById('hold-table');
      const hist = document.getElementById('hold-histogram');
      if (tbl) tbl.style.display = mode === 'table' ? '' : 'none';
      if (hist) hist.style.display = mode === 'histogram' ? '' : 'none';
      const tb = document.getElementById('hold-tbl-btn');
      const hb = document.getElementById('hold-hist-btn');
      if (tb) tb.classList.toggle('active', mode === 'table');
      if (hb) hb.classList.toggle('active', mode === 'histogram');
    }
    const tb = document.getElementById('hold-tbl-btn');
    const hb = document.getElementById('hold-hist-btn');
    if (tb) tb.addEventListener('click', () => setView('table'));
    if (hb) hb.addEventListener('click', () => setView('histogram'));
  },
  update(d) {
    const holdEl = document.getElementById('hold-table');
    if (holdEl && d.held_keys && d.held_keys.length > 0) {
      holdEl.innerHTML = `<table class="hold-table"><thead><tr><th>Key</th><th>Avg Hold</th><th>Max Hold</th><th>Presses</th></tr></thead><tbody>${d.held_keys.map(h =>
        `<tr><td class="key-col">${esc(h.key_name)}</td><td class="ms-col">${Math.round(h.avg_hold_ms)} ms</td><td class="ms-col">${fmtNum(h.max_hold_ms)} ms</td><td>${fmtNum(h.total_holds)}</td></tr>`
      ).join('')}</tbody></table>`;
    }
    const histEl = document.getElementById('hold-histogram');
    if (histEl && d.held_keys && d.held_keys.length > 0) {
      const absMax = Math.max(...d.held_keys.map(x => x.max_hold_ms), 1);
      let html = '';
      for (const h of d.held_keys) {
        const avgPct = Math.max((h.avg_hold_ms / absMax) * 100, 1);
        const maxPct = Math.max((h.max_hold_ms / absMax) * 100, 1);
        html += `<div class="hbar-row"><div class="hbar-label">${esc(h.key_name)}</div><div class="hbar-track"><div class="hbar-fill hbar-fill-max" style="width:${maxPct}%"></div><div class="hbar-fill hbar-fill-avg" style="width:${avgPct}%"></div></div><div class="hbar-value">${Math.round(h.avg_hold_ms)} ms</div></div>`;
      }
      html += `<div class="hold-legend"><span><span class="hold-legend-swatch" style="background:var(--orange)"></span>Avg hold</span><span><span class="hold-legend-swatch" style="background:var(--accent2);opacity:.45"></span>Max hold</span></div>`;
      histEl.innerHTML = html;
    }
  }
});

  try {
    const res = await fetch('/api/stats?token=' + encodeURIComponent(_statsToken));

    updateAllPlugins(d);

}
